<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Native Cooking - Graphics</title>

<style
type="text/css">
#thumbs, #image

{
width: 700px; border: solid 1px
#000; text-align: center; margin:
0 auto 0 auto; color: #000;
background: #eee; padding:
5px;
}

#thumbs {
margin-top: 10px;
}

#thumbs img {
border: solid 1px
#000; margin:
5px;
}

height:400px;
}

.instructions{
font-style:italic;
}

<script language="JavaScript" type="text/javascript">

	PrintButton1 = new Image
	PrintButton2 = new Image
	logo1 = new Image
	logo2 = new Image
if (document.images) {
	PrintButton1.src = "Images/print5.gif"
	PrintButton2.src = "Images/print6.gif"
	logo1.src = "Images/logo1.jpg"
	logo2.src = "Images/logo2.jpg"
}


		var imgArray = new Array(
			'Image1Lg.jpg',
			'Image2Lg.jpg',
			'Image3Lg.jpg',
			'Image4Lg.jpg'
			

		);


		var titleArray = new Array(
			'Cherry Cheesecake',
			'Chocoalte Chip Cookies',
			'Fresh Garden Salad',
			'Flaming Grill'
			
		);
			
		var imgPath = "Images/FullSize/";
		
		function swapImage(imgID) {

			var theImage = document.getElementById('theImage');
			var textDiv = document.getElementById('bottomText');

			var newImg;
			var textTitle;

			newImg = imgArray[imgID];
			theImage.src = imgPath + newImg;

			textTitle=titleArray[imgID];

      			textDiv.innerHTML = textTitle;
		}
			
		function preloadImages() {		
			for(var i = 0; i < imgArray.length; i++) {
				var tmpImg = new Image;
				tmpImg.src = imgPath + imgArray[i];
			}
		}
		

</script>


</head>
<body  onload="preloadImages()">

<div align="center">

<div>
	<a href="" onmouseover="document.getElementById('print').src='Images/PrintPage2.jpg';"
	onmouseout="document.getElementById('print').src='Images/PrintPage.jpg';">
	
	<img src="Images/PrintPage.jpg" alt="Print Page" width="200" height="50"id="print">
	
	</a>
</div>


<div>
	<a href="" onmouseover="document.getElementById('logo').src='Images/NCLogo2.jpg';"
	onmouseout="document.getElementById('logo').src='Images/NCLogo.png';">

	<img src="Images/BackyardBirdLogo.jpg" alt="Logo" id="logo">

	</a>
</div>

<br />
<br />
<br />
<br />


<div id="thumbs">
		<img src="Images/Thumbnails/Image1Sm.jpg" alt="Cherry Cheesecake" onmouseover="swapImage(0);" />
		<img src="Images/Thumbnails/Image2Sm.jpg" alt="Chocolate Chip Cookies" onmouseover="swapImage(1);" />
		<img src="Images/Thumbnails/Image3Sm.jpg" alt="Fresh Garden Salad" onmouseover="swapImage(2);" />
		<img src="Images/Thumbnails/Image4Sm.jpg" alt="Flaming Grill" onmouseover="swapImage(3);" />
		
</div>

	<div id="image">

		<img id="theImage" src="Images/FullSize/Image1Lg.jpg" alt="Cherry Cheesecake" />
		<h3 id="bottomText"> ... </h3>
	</div>

<img src="Images/2colback.jpg" alt="background tile" width="900" height="150">

<br />

<br />



</div>
